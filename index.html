<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{ margin: 0;padding: 0;text-decoration: none;list-style: none;box-sizing: border-box;}
        div{background-image: url(https://img.freepik.com/free-photo/computer-program-coding-screen_53876-138060.jpg?semt=ais_rp_progressive&w=740&q=80); background-repeat: no-repeat;
            position: relative;
        width: 100vw;height: 100vh; background-size: cover; background-position: center; color: white;}
        div::before{
            content: "";
            position: absolute;

            width: 100%;height: 100%;
            background-color: rgba(0, 0, 0, 0.493);
        }
        section{position: absolute;
            left: 50%; transform: translateX(-50%);
            top: 50%; scale: 2;}
    </style>
</head>
<body>
    <div>
        <section>
            <h1 style="cursor: pointer;">안녕하세요 저는 2학년 3반 3번 권제이입니다.</h1> <br>
            저는 코딩을 좋아합니다. <br>
            저는 프론트엔드 개발자가 되고싶습니다.
            
        </section>
</div>
    
</body>
<script>
    const h1= document.querySelector('h1')

    h1.onclick = () => {h1.style.color = 'red'}

    const div = document.querySelector('div')
    
</script>
</html>
